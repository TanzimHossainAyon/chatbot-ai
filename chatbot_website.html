<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBot AI — Tanzim Hossain Ayon</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04060f;
  --surface:#080d1a;
  --card:#0c1220;
  --border:rgba(255,255,255,0.05);
  --blue:#4f8ef7;
  --cyan:#00e5ff;
  --purple:#a855f7;
  --pink:#f472b6;
  --green:#10b981;
  --txt:#e8edf8;
  --muted:#4a5568;
  --muted2:#8899bb;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;cursor:none;}

/* CURSOR */
#cur{position:fixed;z-index:9999;pointer-events:none;width:8px;height:8px;border-radius:50%;background:var(--cyan);mix-blend-mode:screen;transform:translate(-50%,-50%);transition:transform 0.1s;}
#cur-ring{position:fixed;z-index:9998;pointer-events:none;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,229,255,0.25);transform:translate(-50%,-50%);transition:all 0.18s ease;}

/* WEBGL CANVAS */
#gl-canvas{position:fixed;inset:0;z-index:0;}

/* GRID OVERLAY */
.grid{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}

/* GLOW ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:1;}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(79,142,247,0.06),transparent 70%);top:-200px;left:-200px;animation:orb-move 12s ease-in-out infinite;}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(168,85,247,0.05),transparent 70%);bottom:-150px;right:-150px;animation:orb-move 15s ease-in-out infinite reverse;}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,229,255,0.04),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orb-move 10s ease-in-out infinite alternate;}
@keyframes orb-move{0%,100%{transform:translate(0,0);}33%{transform:translate(40px,-30px);}66%{transform:translate(-30px,40px);}}

/* FLOATING PARTICLES (CSS) */
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:1;animation:particle-float linear infinite;}
@keyframes particle-float{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100px) rotate(720deg);opacity:0;}}

/* SCAN LINE */
.scanline{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
  opacity:0.3;
}

/* CORNER DECORATIONS */
.corner{position:fixed;z-index:2;pointer-events:none;}
.corner-tl{top:16px;left:16px;border-top:1px solid rgba(0,229,255,0.3);border-left:1px solid rgba(0,229,255,0.3);width:40px;height:40px;}
.corner-tr{top:16px;right:16px;border-top:1px solid rgba(0,229,255,0.3);border-right:1px solid rgba(0,229,255,0.3);width:40px;height:40px;}
.corner-bl{bottom:16px;left:16px;border-bottom:1px solid rgba(0,229,255,0.3);border-left:1px solid rgba(0,229,255,0.3);width:40px;height:40px;}
.corner-br{bottom:16px;right:16px;border-bottom:1px solid rgba(0,229,255,0.3);border-right:1px solid rgba(0,229,255,0.3);width:40px;height:40px;}

/* APP */
.app{position:relative;z-index:10;display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;width:100%;}

/* HEADER */
header{
  padding:1rem 1.5rem;
  background:rgba(4,6,15,0.8);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(79,142,247,0.1);
  display:flex;align-items:center;gap:1rem;flex-shrink:0;
  position:relative;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);}
.bot-avatar{
  width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;position:relative;
  box-shadow:0 0 25px rgba(79,142,247,0.4);
  animation:avatar-glow 3s ease-in-out infinite;
}
@keyframes avatar-glow{0%,100%{box-shadow:0 0 25px rgba(79,142,247,0.4);}50%{box-shadow:0 0 45px rgba(0,229,255,0.6),0 0 80px rgba(0,229,255,0.2);}}
.bot-avatar::before{content:'';position:absolute;inset:-3px;border-radius:17px;background:linear-gradient(135deg,var(--blue),var(--cyan),var(--purple));z-index:-1;animation:border-rotate 3s linear infinite;}
@keyframes border-rotate{to{filter:hue-rotate(360deg);}}
.bot-info{flex:1;}
.bot-name{font-size:0.95rem;font-weight:700;color:var(--txt);letter-spacing:0.01em;}
.bot-status{font-size:0.72rem;color:var(--green);display:flex;align-items:center;gap:0.4rem;font-weight:500;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite;box-shadow:0 0 6px var(--green);}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 6px var(--green);}50%{opacity:0.5;box-shadow:0 0 12px var(--green);}}
.header-right{text-align:right;}
.header-right .label{font-size:0.68rem;color:var(--muted2);line-height:1.6;}
.header-right .name{font-size:0.78rem;color:var(--blue);font-weight:600;}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:linear-gradient(var(--blue),var(--cyan));border-radius:2px;}

/* MESSAGES */
.msg{display:flex;gap:0.75rem;align-items:flex-end;animation:msg-slide 0.45s cubic-bezier(0.16,1,0.3,1);}
@keyframes msg-slide{from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;border:1px solid var(--border);}
.msg.bot .msg-avatar{background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(0,229,255,0.1));border-color:rgba(79,142,247,0.2);}
.msg.user .msg-avatar{background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(244,114,182,0.1));border-color:rgba(168,85,247,0.2);}
.msg-body{}
.bubble{
  max-width:72%;padding:0.8rem 1.1rem;
  line-height:1.65;font-size:0.875rem;
  position:relative;word-break:break-word;
}
.msg.bot .bubble{
  background:rgba(13,18,32,0.9);
  border:1px solid rgba(79,142,247,0.12);
  border-radius:16px 16px 16px 4px;
  color:var(--txt);
  box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.03);
}
.msg.bot .bubble::before{content:'';position:absolute;inset:0;border-radius:16px 16px 16px 4px;background:linear-gradient(135deg,rgba(79,142,247,0.04),transparent);pointer-events:none;}
.msg.user .bubble{
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  border-radius:16px 16px 4px 16px;
  color:#fff;font-weight:500;
  box-shadow:0 4px 20px rgba(59,130,246,0.35);
}
.msg-time{font-size:0.62rem;color:var(--muted);margin-top:0.3rem;padding:0 0.2rem;}
.msg.user .msg-time{text-align:right;}

/* TYPING */
.typing-wrap{display:flex;gap:0.75rem;align-items:flex-end;animation:msg-slide 0.3s ease;}
.typing-bubble{
  background:rgba(13,18,32,0.9);border:1px solid rgba(79,142,247,0.12);
  border-radius:16px 16px 16px 4px;padding:0.9rem 1.1rem;
  display:flex;gap:5px;align-items:center;
}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:typing 1.4s infinite;}
.typing-bubble span:nth-child(2){animation-delay:0.2s;background:var(--cyan);}
.typing-bubble span:nth-child(3){animation-delay:0.4s;background:var(--purple);}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-7px);opacity:1;}}

/* SUGGESTIONS */
#suggestions{padding:0.75rem 1.5rem;display:flex;gap:0.45rem;flex-wrap:wrap;border-top:1px solid var(--border);flex-shrink:0;background:rgba(4,6,15,0.6);backdrop-filter:blur(12px);}
.chip{
  background:rgba(79,142,247,0.06);border:1px solid rgba(79,142,247,0.15);
  color:var(--muted2);font-size:0.73rem;font-weight:500;
  padding:0.32rem 0.8rem;border-radius:999px;cursor:pointer;
  transition:all 0.2s;font-family:'Outfit',sans-serif;
}
.chip:hover{background:rgba(79,142,247,0.15);color:var(--cyan);border-color:rgba(0,229,255,0.3);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,229,255,0.1);}

/* INPUT */
#input-area{
  padding:0.9rem 1.25rem;
  background:rgba(4,6,15,0.85);
  backdrop-filter:blur(24px);
  border-top:1px solid rgba(79,142,247,0.08);
  display:flex;gap:0.65rem;align-items:flex-end;flex-shrink:0;
  position:relative;
}
#input-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,142,247,0.2),transparent);}
#input{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  padding:0.75rem 1rem;color:var(--txt);
  font-family:'Outfit',sans-serif;font-size:0.875rem;
  outline:none;resize:none;max-height:120px;
  transition:all 0.2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.02);
}
#input:focus{border-color:rgba(79,142,247,0.3);background:rgba(255,255,255,0.06);box-shadow:0 0 0 3px rgba(79,142,247,0.08),inset 0 1px 0 rgba(255,255,255,0.03);}
#input::placeholder{color:var(--muted);}
#send{
  width:42px;height:42px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#000;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s;flex-shrink:0;font-weight:700;
  box-shadow:0 0 20px rgba(79,142,247,0.35);
  position:relative;overflow:hidden;
}
#send::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--cyan),var(--purple));opacity:0;transition:opacity 0.25s;}
#send:hover{transform:scale(1.08) translateY(-1px);box-shadow:0 0 35px rgba(0,229,255,0.5);}
#send:hover::before{opacity:1;}
#send span{position:relative;z-index:1;}
#send:active{transform:scale(0.94);}

/* WELCOME */
.welcome{text-align:center;padding:2rem 1rem;animation:msg-slide 0.7s ease;}
.welcome-ring{
  width:80px;height:80px;border-radius:50%;margin:0 auto 1.25rem;
  background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(0,229,255,0.08));
  border:1px solid rgba(79,142,247,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;position:relative;
  animation:welcome-float 3s ease-in-out infinite;
  box-shadow:0 0 40px rgba(79,142,247,0.15);
}
@keyframes welcome-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.welcome-ring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(0,229,255,0.15);animation:ring-spin 6s linear infinite;}
.welcome-ring::after{content:'';position:absolute;inset:-12px;border-radius:50%;border:1px dashed rgba(79,142,247,0.1);animation:ring-spin 10s linear infinite reverse;}
@keyframes ring-spin{to{transform:rotate(360deg);}}
.welcome h2{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#fff,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem;}
.welcome p{font-size:0.83rem;color:var(--muted2);line-height:1.75;max-width:320px;margin:0 auto;}
</style>
</head>
<body>

<!-- Background effects -->
<canvas id="gl-canvas"></canvas>
<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div id="cur"></div>
<div id="cur-ring"></div>

<div class="app">
  <header>
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <div class="bot-name">ChatBot AI</div>
      <div class="bot-status"><span class="status-dot"></span>Online · Ready to chat</div>
    </div>
    <div class="header-right">
      <div class="label">Built by</div>
      <div class="name">Tanzim Hossain Ayon</div>
      <div class="label">CSE · BRAC University</div>
    </div>
  </header>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-ring">🤖</div>
      <h2>Hello! I'm ChatBot AI</h2>
      <p>Chat with me! I can tell jokes, share fun facts, answer questions about AI, Python, and more.</p>
    </div>
  </div>

  <div id="suggestions">
    <button class="chip" onclick="sendChip('Hello!')">👋 Hello</button>
    <button class="chip" onclick="sendChip('Tell me a joke')">😂 Joke</button>
    <button class="chip" onclick="sendChip('Tell me a fun fact')">🤔 Fun fact</button>
    <button class="chip" onclick="sendChip('What is AI?')">🤖 What is AI?</button>
    <button class="chip" onclick="sendChip('Tell me about Python')">🐍 Python</button>
    <button class="chip" onclick="sendChip('What time is it?')">⏰ Time</button>
    <button class="chip" onclick="sendChip('Who made you?')">👤 Creator</button>
    <button class="chip" onclick="sendChip('Help')">💡 Help</button>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()"><span>➤</span></button>
  </div>
</div>

<script>
// ===== CANVAS PARTICLES =====
const canvas=document.getElementById('gl-canvas');
const ctx=canvas.getContext('2d');
let W,H,pts=[],mouse={x:0,y:0};
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
class Pt{
  constructor(){this.reset(true);}
  reset(init){
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:H+10;
    this.r=Math.random()*1.5+0.3;
    this.vx=(Math.random()-0.5)*0.4;
    this.vy=-Math.random()*0.5-0.1;
    this.op=Math.random()*0.5+0.1;
    this.c=['#4f8ef7','#00e5ff','#a855f7'][Math.floor(Math.random()*3)];
    this.life=Math.random()*200+100;
    this.age=0;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.age++;
    // Mouse repulsion
    let dx=this.x-mouse.x,dy=this.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<150){this.x+=dx/d*1.2;this.y+=dy/d*1.2;}
    if(this.y<-10||this.age>this.life)this.reset(false);
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.c;ctx.globalAlpha=this.op*(1-this.age/this.life);ctx.fill();
  }
}
for(let i=0;i<200;i++)pts.push(new Pt());

// Connect close particles
function connect(){
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      let dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){ctx.beginPath();ctx.strokeStyle=pts[i].c;ctx.globalAlpha=0.06*(1-d/90);ctx.lineWidth=0.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
    }
  }
}

// Space nebula background
let t=0;
function drawHex(){
  t+=0.003;
  // Deep space gradient
  const grad=ctx.createRadialGradient(W*0.3,H*0.4,0,W*0.5,H*0.5,W*0.8);
  grad.addColorStop(0,`rgba(20,10,60,${0.3+Math.sin(t)*0.05})`);
  grad.addColorStop(0.4,`rgba(5,10,30,0.2)`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.globalAlpha=1;ctx.fillRect(0,0,W,H);
  // Nebula clouds
  for(let i=0;i<3;i++){
    const nx=W*(0.2+i*0.3)+Math.sin(t*0.4+i)*80;
    const ny=H*(0.3+i*0.2)+Math.cos(t*0.3+i)*60;
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,W*0.25);
    const cols=['rgba(79,142,247','rgba(168,85,247','rgba(0,229,255'];
    ng.addColorStop(0,cols[i]+',0.04)');
    ng.addColorStop(1,cols[i]+',0)');
    ctx.fillStyle=ng;ctx.globalAlpha=1;ctx.fillRect(0,0,W,H);
  }
  // Stars twinkling
  ctx.globalAlpha=1;
  for(let i=0;i<8;i++){
    const sx=(Math.sin(i*137.5)*0.5+0.5)*W;
    const sy=(Math.cos(i*97.3)*0.5+0.5)*H;
    const ss=Math.sin(t*2+i)*0.8+1.2;
    ctx.beginPath();ctx.arc(sx,sy,ss,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fill();
  }
}

function animBg(){
  ctx.clearRect(0,0,W,H);
  drawHex();
  pts.forEach(p=>{p.update();p.draw();});
  connect();
  ctx.globalAlpha=1;
  requestAnimationFrame(animBg);
}
animBg();

document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

// ===== CURSOR =====
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
function animCur(){tx+=(mx-tx)*0.1;ty+=(my-ty)*0.1;ring.style.left=tx+'px';ring.style.top=ty+'px';requestAnimationFrame(animCur);}
animCur();
document.querySelectorAll('button,textarea,.chip').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2.5)';ring.style.transform='translate(-50%,-50%) scale(1.8)';ring.style.borderColor='rgba(0,229,255,0.5)';});
  el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%)';ring.style.transform='translate(-50%,-50%)';ring.style.borderColor='rgba(0,229,255,0.25)';});
});

// ===== RESPONSES =====
const R={
  greeting:{p:[/hello|hi\b|hey|howdy|good (morning|afternoon|evening)|what'?s up|sup\b/i],r:["Hello! How can I help you today? 😊","Hi there! Great to chat with you! What's on your mind?","Hey! I'm here and ready to assist. What would you like?"]},
  farewell:{p:[/bye|goodbye|see you|take care|later|farewell/i],r:["Goodbye! Have a wonderful day! 👋","See you later! Come back anytime!","Bye! It was great chatting with you! 😊"]},
  how_are:{p:[/how are you|how'?s it going|are you okay|you alright/i],r:["All systems running perfectly! Ready to help you. 🤖","I'm doing great! How about you?","Fantastic! What can I do for you today?"]},
  name:{p:[/what'?s? your name|who are you|introduce yourself/i],r:["I'm ChatBot AI — built with JavaScript by Tanzim Hossain Ayon! 🤖","My name is ChatBot AI! Created by Tanzim Hossain Ayon, CSE graduate from BRAC University.","Call me ChatBot! I run entirely in your browser — no server needed! 🌐"]},
  joke:{p:[/joke|make me laugh|funny|humor/i],r:["Why do programmers prefer dark mode? Because light attracts bugs! 🐛😂","Why did the developer go broke? Because he used up all his cache! 💸😄","A SQL query walks into a bar and asks two tables: 'Can I join you?' 😂","Why do Java developers wear glasses? Because they don't C#! 🤓","How do you comfort a JavaScript developer? You console them! 😄"]},
  fact:{p:[/fun fact|interesting|did you know|something cool/i],r:["Did you know? The first computer bug was an actual moth found in a Harvard computer in 1947! 🦗","Fun fact: Python was named after Monty Python's Flying Circus, not the snake! 🐍","Did you know? There are more chess game possibilities than atoms in the observable universe! ♟️","Fun fact: The first website is still online at info.cern.ch! 🌐","Did you know? 'Robot' comes from the Czech word 'robota' meaning forced labor!"]},
  ai:{p:[/artificial intelligence|\bai\b|machine learning|deep learning|neural/i],r:["AI simulates human intelligence in machines — covering ML, deep learning, NLP, and computer vision! 🤖","Machine learning lets models learn from data without being explicitly programmed for each task.","Deep learning uses multi-layered neural networks — it powers image recognition, chatbots, and more!","My creator Tanzim Hossain Ayon is an IEEE-published AI researcher specialising in deep learning for healthcare! 🔬"]},
  python:{p:[/\bpython\b|programming|coding/i],r:["Python is the #1 language for AI and data science! Libraries like PyTorch and TensorFlow make it powerful. 🐍","Python is beginner-friendly yet incredibly powerful — used for everything from web scraping to building AI!","I was built using Python and JavaScript! Python handles the AI logic, JavaScript brings it to the browser. 💻"]},
  time:{p:[/what time|current time|time is it/i],r:["__TIME__"]},
  date:{p:[/what'?s? (today'?s?)? date|what day|current date/i],r:["__DATE__"]},
  creator:{p:[/who (made|created|built|developed) you|your (creator|developer|author)/i],r:["I was created by Tanzim Hossain Ayon — CSE graduate from BRAC University, Dhaka! He's also an IEEE-published AI researcher. 🎓","My creator is Tanzim Hossain Ayon! Check his portfolio at tanzimhossainayon.vercel.app 🌐","Built by Tanzim Hossain Ayon — deep learning researcher, IEEE author, and CSE graduate from BRAC University!"]},
  thanks:{p:[/thank(s| you)|thx|appreciate|grateful/i],r:["You're welcome! 😊","Happy to help! Anything else?","No problem at all! 🌟"]},
  help:{p:[/help|what can you do|capabilities/i],r:["Here's what I can do:\n\n💬 General conversation\n😂 Jokes & fun facts\n🤖 AI & tech knowledge\n🐍 Python info\n⏰ Current time & date\n👤 About my creator\n\nJust type anything!"]},
  compliment:{p:[/you'?re? (good|great|awesome|amazing|smart|cool|helpful)|well done/i],r:["Thank you so much! 😊","That made my circuits warm! 🤖💙","Thanks! I always try to be as helpful as possible!"]},
};
const defaults=["Hmm, not sure about that. Try asking something else! 🤔","Interesting question! That's beyond my current knowledge — ask about AI, jokes, or Python!","I didn't quite get that. Type 'help' to see what I can do! 😊","Great question, but I'm still learning! Try asking me for a joke or a fun fact. 😄"];

function getBotRes(input){
  const l=input.toLowerCase();
  for(const[,d] of Object.entries(R)){
    for(const p of d.p){
      if(p.test(l)){
        const r=d.r[Math.floor(Math.random()*d.r.length)];
        if(r==='__TIME__'){const n=new Date();return`The current time is ${n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} ⏰`;}
        if(r==='__DATE__'){const n=new Date();return`Today is ${n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} 📅`;}
        return r;
      }
    }
  }
  return defaults[Math.floor(Math.random()*defaults.length)];
}

// ===== UI =====
const chatEl=document.getElementById('chat');
function ts(){const n=new Date();return n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}

function addMsg(text,isUser){
  const m=document.createElement('div');
  m.className=`msg ${isUser?'user':'bot'}`;
  m.innerHTML=`
    <div class="msg-avatar">${isUser?'👤':'🤖'}</div>
    <div class="msg-body">
      <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${ts()}</div>
    </div>`;
  chatEl.appendChild(m);
  chatEl.scrollTop=chatEl.scrollHeight;
}

function showTyping(){
  const t=document.createElement('div');
  t.className='typing-wrap';t.id='typing';
  t.innerHTML=`<div class="msg-avatar" style="background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(0,229,255,0.1));border:1px solid rgba(79,142,247,0.2);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;">🤖</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chatEl.appendChild(t);chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function sendMessage(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text)return;
  const w=document.querySelector('.welcome');if(w)w.remove();
  addMsg(text,true);
  inp.value='';inp.style.height='auto';
  showTyping();
  setTimeout(()=>{hideTyping();addMsg(getBotRes(text),false);},700+Math.random()*800);
}

function sendChip(text){
  document.getElementById('input').value=text;
  sendMessage();
}

document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
</script>
